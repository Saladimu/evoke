    <!-- The iframe starts empty to prevent history corruption -->
    <iframe id="appsheet-frame"></iframe>

     <script>
        // 1. Force the iframe to load cleanly without storing memory in Android's back stack
        window.onload = function() {
            const iframe = document.getElementById('appsheet-frame');
            const appsheetUrl = "https://www.appsheet.com/start/6ebd3094-b4f7-45cc-ba70-698e89d4df68?platform=desktop#appName=CalendarEvoke-110568804&vss=H4sIAAAAAAAAA62PvQrCMBRGX0W-uU-QVRxUdLG4GIfY3EowTaRJrSXk3b31B3EtjjmXc_iScDPU76KqLhCH9H2taYBAkiiHK0kIibl3sfVWopDYquYFV0r3ys5K5bRxZ4mMfCw-lUgBIk2JiH8sKWA0uWhqQ-1YHH0uvW0-jy6DXxO5QNNFdbL0_AKbOTOrfdUF0nueNXlOWLrF_cpo4zWHa2UD5QdQ5Nd9gwEAAA==&view=Jadwal%20Tanding"; 
            if (iframe) {
                iframe.contentWindow.location.replace(appsheetUrl);
            }
        };

        // 2. Median.co JS Bridge: Intercept Android physical back button and gesture
        document.addEventListener("DOMContentLoaded", function() {
            window.median = window.median || {};
            window.median.android = window.median.android || {};
            
            // Tells Median to run this custom Javascript instead of breaking the app view
            window.onAndroidBackKey = function() {
                window.location.href = "index.html";
                return true; // Prevents the default webview 'No Internet' crash
            };
        });
        
        // 3. Browser fallback for web testing
        window.history.pushState(null, "", window.location.href);
        window.addEventListener('popstate', function () {
            window.location.href = "index.html";
        });
    </script>
